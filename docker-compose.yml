version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: stock_db
    environment:
      POSTGRES_USER: splash
      POSTGRES_PASSWORD: splash
      POSTGRES_DB: stock_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stock-network

  backend:
    image: ${BACKEND_IMAGE}
    container_name: stock_backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://splash:splash@db:5432/stock_db
      PORT: 3001
    depends_on:
      - db
    networks:
      - stock-network

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: stock_frontend
    ports:
      - "80:80" # FIX 3: production images serve on 80 (nginx), not 5173
    environment:
      VITE_API_URL: http://localhost:3001 # NOTE: this must be set at build time for Vite — see note below
    depends_on:
      - backend
    networks:
      - stock-network

  prometheus:
    image: prom/prometheus:latest
    container_name: stock_prometheus
    ports:
      - "9090:9090"
    volumes:
      - /var/jenkins_home/workspace/stock-management-cicd/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro # FIX 4: use absolute Jenkins path, add :ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - stock-network
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: stock_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - stock-network

volumes:
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  stock-network:
    driver: bridge
