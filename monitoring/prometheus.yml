global:
  scrape_interval: 15s
  external_labels:
    monitor: "stock-monitor"

scrape_configs:
  - job_name: "backend"
    static_configs:
      - targets: ["backend:3001"]
    metrics_path: "/metrics"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alert-rules.yml"
