global:
  scrape_interval: 15s
  external_labels:
    monitor: "stock-monitor"

scrape_configs:
  - job_name: "backend"
    static_configs:
      - targets: ["host.docker.internal:3001"]
    metrics_path: "/metrics"

  - job_name: "docker"
    static_configs:
      - targets: ["host.docker.internal:7070"]

  - job_name: "jenkins"
    static_configs:
      - targets: ["host.docker.internal:8080"]
    metrics_path: "/prometheus"
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alert-rules.yml"
